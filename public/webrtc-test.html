<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>WebRTC Screen Share + Audio</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #1a1a1a;
      color: #fff;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      background-color: #111;
      padding: 10px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #333;
    }

    h2 {
      margin: 0;
      font-weight: 600;
      font-size: 18px;
    }

    button {
      background: #00a884;
      border: none;
      padding: 8px 14px;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      color: #fff;
      transition: background 0.2s;
    }

    button:hover {
      background: #009272;
    }

    main {
      display: flex;
      flex: 1;
      gap: 10px;
      padding: 10px;
      overflow: hidden;
    }

    #local-container {
      flex: 0 0 250px;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: #222;
      padding: 10px;
      border-radius: 8px;
    }

    #localVideo {
      width: 100%;
      border-radius: 6px;
      border: 2px solid #00a884;
      margin-bottom: 8px;
    }

    #remoteVideo {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 10px;
      overflow-y: auto;
      padding: 10px;
      background: #181818;
      border-radius: 8px;
    }

    #remoteVideo video {
      width: 100%;
      border-radius: 6px;
      border: 2px solid #444;
      background: black;
    }

    /* Scrollbar styling */
    #remoteVideo::-webkit-scrollbar {
      width: 6px;
    }
    #remoteVideo::-webkit-scrollbar-thumb {
      background: #444;
      border-radius: 3px;
    }
  </style>
</head>
<body>
  <header>
    <h2>WebRTC Call (Screen + Audio)</h2>
    <button id="shareScreenBtn">Share Screen Again</button>
  </header>

  <main>
    <div id="local-container">
      <video id="localVideo" autoplay muted></video>
      <span style="font-size: 12px; color: #aaa;">You</span>
    </div>
    <div id="remoteVideo"></div>
  </main>

  <script src="/socket.io/socket.io.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/simple-peer@9.11.1/simplepeer.min.js"></script>

  <script>
    const socket = io();
    const peers = {};
    const room = prompt("Enter room name", "default-room") || "default-room";

    const localVideo = document.getElementById('localVideo');
    const videoGrid = document.getElementById('remoteVideo');
    const shareScreenBtn = document.getElementById('shareScreenBtn');

    let localStream;

    async function getMedia() {
      const screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
      const audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });

      localStream = new MediaStream([
        ...screenStream.getVideoTracks(),
        ...audioStream.getAudioTracks()
      ]);

      localVideo.srcObject = localStream;
    }

    function addVideoStream(stream) {
      const video = document.createElement('video');
      video.srcObject = stream;
      video.autoplay = true;
      video.playsInline = true;
      videoGrid.appendChild(video);
    }

    socket.on('all-users', users => {
      users.forEach(userId => {
        const peer = createPeer(userId, socket.id);
        peers[userId] = peer;
      });
    });

    socket.on('user-joined', userId => {
      const peer = addPeer(userId, socket.id);
      peers[userId] = peer;
    });

    socket.on('user-signal', payload => {
      const peer = peers[payload.callerId];
      peer.signal(payload.signal);
    });

    socket.on('receiving-returned-signal', payload => {
      const peer = peers[payload.id];
      peer.signal(payload.signal);
    });

    socket.on('user-left', id => {
      if (peers[id]) {
        peers[id].destroy();
        delete peers[id];
      }
    });

    function createPeer(userToSignal, callerId) {
      const peer = new SimplePeer({
        initiator: true,
        trickle: false,
        stream: localStream,
      });

      peer.on('signal', signal => {
        socket.emit('sending-signal', { userToSignal, callerId, signal });
      });

      peer.on('stream', addVideoStream);
      return peer;
    }

    function addPeer(incomingId, callerId) {
      const peer = new SimplePeer({
        initiator: false,
        trickle: false,
        stream: localStream,
      });

      peer.on('signal', signal => {
        socket.emit('returning-signal', { signal, callerId: incomingId });
      });

      peer.on('stream', addVideoStream);
      return peer;
    }

    getMedia().then(() => {
      socket.emit('join', room);
    });

    shareScreenBtn.onclick = async () => {
      const screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
      const videoTrack = screenStream.getVideoTracks()[0];

      for (let peerId in peers) {
        const sender = peers[peerId]._pc.getSenders().find(s => s.track.kind === 'video');
        if (sender) {
          sender.replaceTrack(videoTrack);
        }
      }

      localStream.removeTrack(localStream.getVideoTracks()[0]);
      localStream.addTrack(videoTrack);
      localVideo.srcObject = localStream;

      videoTrack.onended = () => {
        alert("Screen sharing ended.");
      };
    };
  </script>
</body>
</html>
